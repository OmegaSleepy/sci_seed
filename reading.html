<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Reading • SCI-SEED</title>
	<link rel="stylesheet" href="assets/style.css">
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
<div class="container">
	<header>
		<h1 id="nav-title"><a href="index.html">SCI-SEED</a></h1>
		<nav><a href="archive.html">Archive</a></nav>
	</header>

	<main>
		<h1 id="doc-title" style="color: var(--accent-color);"></h1>
		<div id="reader-area" class="content-area">Loading file encryption streams...</div>
	</main>
</div>

<button id="backToTopBtn" class="terminal-totop" title="Return to Top" onclick="scrollToTop()">
	<span class="arrow">▲</span><span class="btn-text">TOP_LN</span>
</button>

<footer>© 2026 • OmegaSleepy</footer>

<script>
 async function loadDocument() {
  const params = new URLSearchParams(window.location.search);
  let fileUrl = params.get('file');
  let title = params.get('title');

  if (!fileUrl && title) {
   fileUrl = await findFilePathByTitle(title);
  }

  if (!fileUrl) {
   document.getElementById('reader-area').innerText = "Error: System could not resolve file path parameters.";
   return;
  }

  document.getElementById('doc-title').innerText = title || "Data Entry";

  try {
   let fetchPath = fileUrl;
   if (!fetchPath.startsWith('http')) {
    fetchPath = fetchPath.replace(/^\//, '');
   }

   const response = await fetch(fetchPath);
   if (!response.ok) throw new Error("File not found");
   const rawText = await response.text();

   parseAndRender(rawText);
  } catch (err) {
   document.getElementById('reader-area').innerText = `Error 404: Node stream broken or missing.`;
  }
 }

 async function findFilePathByTitle(title) {
  try {
   const response = await fetch('chapter_list.csv');
   const csvText = await response.text();
   const lines = csvText.split('\n').map(l => l.trim());
   let currentArc = "";

   for (let line of lines) {
    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    if (parts.length < 2) {
     currentArc = parts[0].replace(/"/g, '');
    } else {
     const lineTitle = parts[0].replace(/"/g, '');
     if (lineTitle === title) {
      return currentArc ? `reading/${currentArc}/${title}.md` : `reading/${title}.md`;
     }
    }
   }
  } catch (e) {
   console.error(e);
  }
  return null;
 }

 function parseAndRender(rawText) {
  const readerArea = document.getElementById('reader-area');

  const yamlRegex = /^---\r?\n([\s\S]*?)\r?\n---\r?\n/;
  const match = rawText.match(yamlRegex);

  let markdownContent = rawText;
  let config = {type: 'chapter', status: 'full'};

  if (match) {
   try {
    config = jsyaml.load(match[1]);
    markdownContent = rawText.replace(yamlRegex, '');
   } catch (e) {
    console.error("YAML parsing error: ", e);
   }
  }

  // Handle WikiLinks
  const wikiLinkRegex = /\[\[([^\]|]+)\|([^\]]+)\]\]/g;
  markdownContent = markdownContent.replace(wikiLinkRegex, (match, path, display) => {
   const filePath = path.trim();
   let displayText = display.trim();
   const fullFileUrl = `reading/${filePath}.md`;
   const extensionMatch = displayText.match(/\.([a-zA-Z0-9]+)$/);
   const badgeText = extensionMatch ? extensionMatch[1].toUpperCase() : "EXE";

   if (extensionMatch) {
    displayText = displayText.replace(/\.[a-zA-Z0-9]+$/, '');
   }
   return `<a class="wiki-link-console" href="reading.html?file=${encodeURIComponent(fullFileUrl)}&title=${encodeURIComponent(displayText)}" data-cmd="${badgeText}">${displayText}</a>`;
  });

  // Convert Markdown to HTML
  let htmlContent = marked.parse(markdownContent);

  // Custom Divider
  const customDivider = '<div class="sci-fi-hr">[ DATA_SEGMENT_BREAK ]</div>';
  htmlContent = htmlContent.replace(/<hr\s*\/?>/g, customDivider);

  // SAFE TABLE WRAPPING IMPLEMENTATION
  const hasTable = htmlContent.includes('<table');
  if (hasTable) {
   const tableToggleButton = `<button id="mobileTableToggle" type="button" class="enter-btn mobile-table-toggle" aria-expanded="false">SHOW TABLE CONTENT</button>`;

   // Create a temporary sandboxed DOM element to safely wrap tables without messy string replaces
   const tempDiv = document.createElement('div');
   tempDiv.innerHTML = htmlContent;
   const tables = tempDiv.getElementsByTagName('table');

   // Loop backwards to safely wrap any markdown tables found
   for (let i = tables.length - 1; i >= 0; i--) {
    const table = tables[i];
    const wrapper = document.createElement('div');
    wrapper.className = 'table-toggle-wrapper';
    wrapper.innerHTML = `${tableToggleButton}<div class="table-container"></div>`;

    table.parentNode.insertBefore(wrapper, table);
    wrapper.querySelector('.table-container').appendChild(table);
   }
   htmlContent = tempDiv.innerHTML;
  }

  // Map YAML statuses
  const validStatuses = ['full', 'partial', 'encrypted', 'corrupted'];
  const statusKey = validStatuses.includes(config.status) ? config.status : 'full';

  const statusLabels = {
   full: 'SYS_INTEGRITY: 100%',
   partial: 'SYS_INTEGRITY: INCOMPLETE',
   encrypted: 'SYS_INTEGRITY: LOCKED_STREAM',
   corrupted: 'SYS_INTEGRITY: CORRUPTED_SECTOR'
  };

  const statusIndicatorHtml = `
     <span class="status-indicator status-${statusKey}">
         <span class="status-dot"></span>${statusLabels[statusKey]}
     </span>
  `;

  if (config.type === 'document') {
   readerArea.className = "content-area mode-document";
   const isIntact = (statusKey === 'full' || statusKey === 'partial');
   const mainStatusText = isIntact ? "STATUS: RECORD_DECRYPTED" : "STATUS: THROWN EXCEPTION";
   const alertClass = isIntact ? "" : "class=\"text-alert-amber\"";

   const documentHeader = `
            <div class="reading-header">
                <div class="reading-header-left">
                    <span ${alertClass}>${mainStatusText}</span>
                </div>
                <div class="reading-header-right">
                    ${statusIndicatorHtml}
                    <span class="directive-label">SECURE ARCHIVE DIRECTIVE</span>
                </div>
            </div>
        `;
   const documentFooter = `<div class="document-stream-footer">File Stream Exhausted</div>`;
   readerArea.innerHTML = documentHeader + htmlContent + documentFooter;
  } else {
   readerArea.className = "content-area mode-chapter";
   const chapterHeader = `
            <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
                ${statusIndicatorHtml}
            </div>
        `;
   readerArea.innerHTML = chapterHeader + htmlContent;
  }

  // Safe Toggle Attachments
  if (hasTable) {
   const toggleBtn = document.getElementById('mobileTableToggle');
   if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
     const expanded = toggleBtn.getAttribute('aria-expanded') === 'true';
     toggleBtn.setAttribute('aria-expanded', String(!expanded));
     toggleBtn.textContent = expanded ? 'SHOW TABLE CONTENT' : 'HIDE TABLE CONTENT';
     document.body.classList.toggle('table-expanded-mobile', !expanded);
    });
   }
  }
 }

window.onload = loadDocument;

window.onscroll = function() {
  const topBtn = document.getElementById("backToTopBtn");
  if (topBtn) {
    if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
      topBtn.classList.add("show");
    } else {
      topBtn.classList.remove("show");
    }
  }
};

function scrollToTop() {
  window.scrollTo({
   top: 0,
   behavior: "smooth"
  });
}
</script>

<script src="js/obfuscated.js" defer></script>

</body>
</html>
